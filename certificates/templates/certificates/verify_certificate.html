<!DOCTYPE html>
<html>
<head>
    <title>Verify Certificate</title>
</head>
<body>

    <h1>Verify Certificate</h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Verify Certificate
        </button>

    </form>

    {% if result %}
        <h2>{{ result }}</h2>
    {% endif %}

</body>
</html>
