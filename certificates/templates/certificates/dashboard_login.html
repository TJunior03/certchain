<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertChain — Staff Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0f1e;
            color: #e0e6f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: #0d1b2a;
            border: 1px solid #1565c020;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 800;
            color: #4fc3f7;
            letter-spacing: 3px;
        }

        .logo p {
            font-size: 13px;
            color: #546e7a;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #90caf9;
            font-weight: 600;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #0a0f1e;
            border: 1px solid #1565c040;
            border-radius: 8px;
            color: #e0e6f0;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border-color: #4fc3f7; }

        button {
            width: 100%;
            padding: 14px;
            background: #1565c0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        button:hover { background: #1976d2; }

        .error {
            background: #7f000040;
            border: 1px solid #ef5350;
            border-radius: 8px;
            padding: 12px 16px;
            color: #ef9a9a;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            font-size: 13px;
            color: #546e7a;
            text-decoration: none;
        }

        .back-link a:hover { color: #90caf9; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>⛓ CERTCHAIN</h1>
            <p>Staff Portal — Login</p>
        </div>

        {% if form.errors %}
        <div class="error">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username"
                       placeholder="Enter your username"
                       autofocus required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div style="position: relative;">
                    <input type="password" name="password" id="passwordInput"
                        placeholder="Enter your password"
                        style="width:100%; padding:12px 48px 12px 16px; background:#0a0f1e;
                                border:1px solid #1565c040; border-radius:8px;
                                color:#e0e6f0; font-size:14px; outline:none;"
                        required>
                    <button type="button" onclick="togglePassword()"
                            style="position:absolute; right:12px; top:50%;
                                transform:translateY(-50%); background:none;
                                border:none; color:#546e7a; cursor:pointer;
                                font-size:18px; padding:0; width:auto;">
                        👁
                    </button>
                </div>
            </div>

                <script>
                function togglePassword() {
                    const input = document.getElementById('passwordInput');
                    const btn   = event.currentTarget;
                    if (input.type === 'password') {
                        input.type = 'text';
                        btn.textContent = '🙈';
                    } else {
                        input.type = 'password';
                        btn.textContent = '👁';
                    }
                }
                </script>

            <button type="submit">Login to Dashboard</button>
        </form>

        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>
</body>
</html>
